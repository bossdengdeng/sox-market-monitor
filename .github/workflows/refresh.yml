name: Daily market refresh

on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python update_data.py
        env:
          US_MARKET_CAP_ANCHOR_DATE: ${{ vars.US_MARKET_CAP_ANCHOR_DATE }}
          US_MARKET_CAP_ANCHOR_USD: ${{ vars.US_MARKET_CAP_ANCHOR_USD }}
          US_MARKET_PROXY: VTI

      - name: Commit data
        run: |
          git config user.name "market-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/history.json
          git diff --cached --quiet || git commit -m "Refresh SOX market-share data"
          git push
